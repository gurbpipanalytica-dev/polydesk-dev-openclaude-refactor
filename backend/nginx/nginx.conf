events {}

http {
    resolver 127.0.0.11 valid=30s ipv6=off;

    server {
        listen 80;
        server_name api.gurbcapital.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name api.gurbcapital.com;

        ssl_certificate     /etc/letsencrypt/live/api.gurbcapital.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.gurbcapital.com/privkey.pem;

        location / {
            set $upstream "polydesk-orchestrator:8765";
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
            if ($request_method = OPTIONS) { return 204; }
        }
    }
}

